spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:taskflow_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:tu_password_local}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}
jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234